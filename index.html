<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平成会勝ち馬投票</title>

<style>
body{
    font-family: sans-serif;
    background:#f5f5f5;
    max-width:600px;
    margin:auto;
    padding:20px;
}
h1{
    text-align:center;
}
button{
    width:100%;
    padding:15px;
    margin:8px 0;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>🐎 平成会 勝ち馬投票 🐎</h1>

<p>投票したい馬を選んでください。</p>

<div id="horses"></div>

<script>

const horses=[
"① サンプル馬A",
"② サンプル馬B",
"③ サンプル馬C",
"④ サンプル馬D"
];

const div=document.getElementById("horses");

horses.forEach(name=>{
    const btn=document.createElement("button");
    btn.textContent=name;
    btn.onclick=()=>{
        alert(name+" に投票しました！（まだ保存機能はありません）");
    };
    div.appendChild(btn);
});

</script>

</body>
</html>
