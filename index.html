<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平成会 勝ち馬投票</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js" defer></script>

</head>

<body>

<div class="container">

<h1>🏇 平成会 勝ち馬投票 🏇</h1>

<div class="card">

<label>あなたのお名前</label>

<input
type="text"
id="name"
placeholder="名前を入力してください">

</div>

<div class="card">

<h2>勝ち馬を選択</h2>

<div id="horseList"></div>

</div>

<div class="button-area">

<button id="voteBtn">
投票する
</button>

</div>

<div id="message"></div>

<hr>

<h2>現在の投票数</h2>

<div id="totalVote">
0票
</div>

</div>

</body>
</html>
